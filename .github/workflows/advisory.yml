name: BLT Preflight Advisory

on:
  pull_request:
    types: [opened, synchronize, reopened]
  issues:
    types: [opened, labeled]

permissions:
  pull-requests: write
  issues: write
  contents: read

jobs:
  security-advisory:
    runs-on: ubuntu-latest
    name: Security Advisory Check
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
      
      - name: Get PR files
        if: github.event_name == 'pull_request'
        id: pr-files
        uses: actions/github-script@v7
        with:
          script: |
            const { data: files } = await github.rest.pulls.listFiles({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.payload.pull_request.number,
            });
            return files.map(f => f.filename).join(',');
      
      - name: Get PR labels
        if: github.event_name == 'pull_request'
        id: pr-labels
        uses: actions/github-script@v7
        with:
          script: |
            const labels = context.payload.pull_request.labels.map(l => l.name);
            return labels.join(',');
      
      - name: Get issue labels
        if: github.event_name == 'issues'
        id: issue-labels
        run: |
          echo "labels=${{ join(github.event.issue.labels.*.name, ',') }}" >> $GITHUB_OUTPUT
      
      - name: Generate security advisory
        id: advisory
        run: |
          if [ "${{ github.event_name }}" == "pull_request" ]; then
            FILES="${{ steps.pr-files.outputs.result }}"
            LABELS="${{ steps.pr-labels.outputs.result }}"
          else
            FILES=""
            LABELS="${{ steps.issue-labels.outputs.labels }}"
          fi
          
          # Remove quotes from the output
          FILES=$(echo $FILES | tr -d '"')
          LABELS=$(echo $LABELS | tr -d '"')
          
          python3 src/blt_preflight.py advise \
            --labels "$LABELS" \
            --files "$FILES" \
            --repo "${{ github.repository }}" \
            --output /tmp/advisory.md \
            --json /tmp/advisory.json
          
          # Set output for posting
          echo "advisory_generated=true" >> $GITHUB_OUTPUT
      
      - name: Post advisory as comment
        if: github.event_name == 'pull_request' && steps.advisory.outputs.advisory_generated == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const advisory = fs.readFileSync('/tmp/advisory.md', 'utf8');
            
            // Check if we already posted an advisory
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
            });
            
            const botComment = comments.find(comment => 
              comment.user.type === 'Bot' && 
              comment.body.includes('BLT Preflight Security Advisory')
            );
            
            if (botComment) {
              // Update existing comment
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body: advisory
              });
            } else {
              // Create new comment
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.pull_request.number,
                body: advisory
              });
            }
      
      - name: Post advisory to issue
        if: github.event_name == 'issues' && steps.advisory.outputs.advisory_generated == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const advisory = fs.readFileSync('/tmp/advisory.md', 'utf8');
            
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.issue.number,
              body: advisory
            });
      
      - name: Upload advisory artifact
        if: steps.advisory.outputs.advisory_generated == 'true'
        uses: actions/upload-artifact@v3
        with:
          name: security-advisory
          path: |
            /tmp/advisory.md
            /tmp/advisory.json
